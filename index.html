<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ancient Yew Digital Twin</title>
    <meta
      name="description"
      content="A prototype 3D digital twin of an ancient yew tree in Surrey, created from Luma AI scans."
    >
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      :root {
        color: #1f2520;
        background: #f7f7f2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(247, 247, 242, 0.96)),
          #f7f7f2;
      }

      main {
        width: min(100% - 32px, 1120px);
        margin: 0 auto;
        padding: 72px 0;
      }

      header {
        max-width: 780px;
        margin-bottom: 48px;
      }

      h1 {
        margin: 0;
        color: #172019;
        font-size: clamp(2.5rem, 6vw, 5.75rem);
        line-height: 0.96;
        font-weight: 800;
      }

      .intro {
        margin: 24px 0 0;
        color: #455047;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        line-height: 1.6;
      }

      .scan-list {
        display: grid;
        gap: 36px;
      }

      .scan {
        display: grid;
        gap: 14px;
      }

      .scan h2 {
        margin: 0;
        color: #253027;
        font-size: clamp(1.35rem, 2.5vw, 2rem);
        line-height: 1.15;
      }

      model-viewer {
        display: block;
        width: 100%;
        height: clamp(420px, 68vh, 760px);
        overflow: hidden;
        background: #eceee8;
        border: 1px solid rgba(31, 37, 32, 0.12);
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(20, 29, 22, 0.12);
      }

      model-viewer::part(default-progress-bar) {
        background-color: #6d796c;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 40px 0;
        }

        header {
          margin-bottom: 34px;
        }

        .scan-list {
          gap: 28px;
        }

        model-viewer {
          height: 70vh;
          min-height: 360px;
          max-height: 580px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Ancient Yew Digital Twin</h1>
        <p class="intro">
          A prototype 3D digital twin of an ancient yew tree in Surrey, created
          from Luma AI scans.
        </p>
      </header>

      <section class="scan-list" aria-label="3D scan viewers">
        <article class="scan">
          <h2>Ground Scan</h2>
          <model-viewer
            src="assets/yew_1.glb"
            alt="Ground-level 3D scan of an ancient yew tree"
            camera-controls
            auto-rotate
            auto-rotate-delay="1000"
            interaction-prompt="auto"
            environment-image="neutral"
            shadow-intensity="0.65"
            exposure="1"
            loading="eager"
          ></model-viewer>
        </article>

        <article class="scan">
          <h2>Second Scan</h2>
          <model-viewer
            src="assets/yew_2.glb"
            alt="Second 3D scan of an ancient yew tree"
            camera-controls
            auto-rotate
            auto-rotate-delay="1000"
            interaction-prompt="auto"
            environment-image="neutral"
            shadow-intensity="0.65"
            exposure="1"
            loading="lazy"
          ></model-viewer>
        </article>
      </section>
    </main>
  </body>
</html>
